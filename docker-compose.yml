services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/backend
      - backend_node_modules:/backend/node_modules

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
      
    environment:
      WATCHPACK_POLLING: "true"

volumes:
  backend_node_modules:
  frontend_node_modules:
  